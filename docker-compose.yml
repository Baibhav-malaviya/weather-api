version: '3.9'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Weather@1234
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build:
      context: ./WeatherAppSolution/WeatherApp
    container_name: weather-api
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Server=sqlserver;Database=WeatherDb;User Id=sa;Password=Weather@1234;TrustServerCertificate=True;
    ports:
      - "7186:8080"

  frontend:
    build:
      context: ./weather-ui
    container_name: weather-ui
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  sql_data: