<section class="w-full flex items-center justify-center my-8">
    <div class="flex flex-col gap-2 bg-white p-8 border border-gray-300 rounded-2xl w-1/2">
        <h1 class="text-2xl font-bold w-full text-center my-4">This is Register page</h1>
        <input [(ngModel)]="formState.username" type="email" placeholder="Enter your email" class="w-full border border-gray-300 px-3 py-1 rounded-2xl focus:border-gray-500">
        <input [(ngModel)]="formState.password" type="password" placeholder="Enter your password" class="w-full border border-gray-300 px-3 py-1 rounded-2xl focus:border-gray-500">
        <div class=" bg-gray-300 h-px my-4 mx-2"></div>
        <div class="flex justify-between">
            <button (click)="register()" class="bg-green-500 rounded-2xl w-fit py-1 px-3 font-semibold hover:cursor-pointer hover:scale-110 transition-all">Submit</button>
            <a routerLink="/login" class="text-blue-500 hover:cursor-pointer hover:underline">Already an user?</a>
        </div>
    </div>
</section>
