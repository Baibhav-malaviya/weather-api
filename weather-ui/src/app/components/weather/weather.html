<section class="w-full flex flex-col items-center justify-center my-8 bg-amber-600">
    <div class="flex flex-col gap-2 bg-white p-8 border border-gray-300 rounded-2xl w-1/2">
        <div class="flex items-center justify-between gap-0.5">
            <input [(ngModel)]="city" placeholder="Enter city" class="w-full border border-gray-300 px-3 py-1 rounded-2xl focus:border-gray-500 focus:outline-none">
            <button (click)="fetchWeatherByCity()" class="bg-green-500 rounded-2xl w-fit py-1 px-3 font-semibold hover:cursor-pointer hover:scale-110 transition-all">Submit</button>
        </div>
    </div>

    <div class="mt-8 w-1/2">
        @if(weatherData) {

            <div class="bg-white rounded-2xl p-6 border border-gray-200">

            <h2 class="text-2xl font-semibold text-gray-800 mb-4">
                Weather of 
                <span class="uppercase italic text-blue-600">
                {{ city }}
                </span>
            </h2>

            <div class="space-y-2 text-gray-800">

                <p class="flex justify-between">
                <span class="font-medium">Temp:</span>
                <span>{{ weatherData.temp }} °C</span>
                </p>

                <p class="flex justify-between">
                <span class="font-medium">Feels like:</span>
                <span>{{ weatherData.feels_like }} °C</span>
                </p>

                <div class="h-px bg-gray-300 my-3"></div>

                <div class="flex justify-between">
                <p>
                    <span class="font-medium">Min:</span>
                    <span class="ml-1">{{ weatherData.temp_min }} °C</span>
                </p>

                <p>
                    <span class="font-medium">Max:</span>
                    <span class="ml-1">{{ weatherData.temp_max }} °C</span>
                </p>
                </div>

            </div>

            </div>

        } @else {

            <div class="text-center text-gray-500 mt-10">
            <h1 class="text-lg font-medium">
                Enter your city name
            </h1>
            </div>

        }
    </div>
    
    <app-weather-history/>
</section>
